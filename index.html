<style>
    body {
        margin: 0;
        padding: 0;
        text-align: center;
        background-color: #f4f4f9;
        font-family: 'Arial', sans-serif;
    }

    .container {
        margin-top: 100px;
    }

    .initials-wrapper {
        font-size: 100px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    /* D අකුර වම් පැත්තෙන් එනවා */
    .d-initial {
        color: #4a4a8c;
        animation: slideFromLeft 1s ease-out forwards;
    }

    /* P අකුර දකුණු පැත්තෙන් එනවා */
    .p-initial {
        color: #ff9900;
        animation: slideFromRight 1s ease-out forwards;
    }

    /* නම පස්සේ වැටෙනවා */
    .full-name {
        font-size: 40px;
        color: #333;
        margin-top: 20px;
        opacity: 0;
        animation: fadeIn 1s ease-in 1s forwards; /* තත්පර 1කට පස්සේ පේනවා */
    }

    @keyframes slideFromLeft {
        0% { transform: translateX(-100vw); }
        100% { transform: translateX(0); }
    }

    @keyframes slideFromRight {
        0% { transform: translateX(100vw); }
        100% { transform: translateX(0); }
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }
</style>
