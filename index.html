<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Dunhinda Pradeep - Mathematics Portfolio</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; text-align: center; }

        /* Initials Collision Animation */
        .intro-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .initials-wrapper { display: flex; font-size: 120px; font-weight: bold; overflow: hidden; }
        .d-initial { color: #4a4a8c; animation: crashD 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .p-initial { color: #ff9900; animation: crashP 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .full-name { font-size: 50px; color: #333; margin-top: 10px; opacity: 0; animation: showName 0.8s ease forwards 1s; }

        /* Rest of the content */
        .content { padding: 50px; opacity: 0; animation: fadeIn 1s ease forwards 2s; }

        @keyframes crashD { 0% { transform: translateX(-100vw); } 100% { transform: translateX(0); } }
        @keyframes crashP { 0% { transform: translateX(100vw); } 100% { transform: translateX(0); } }
        @keyframes showName { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="intro-container">
        <div class="initials-wrapper">
            <span class="d-initial">D</span>
            <span class="p-initial">P</span>
        </div>
        <div class="full-name">Dunhinda Pradeep</div>
    </div>

    <div class="content">
        <h1>ගණිතය - විශේෂ පන්ති</h1>
        <p>ඔබේ ගණිත ගැටලු විසඳා ගැනීමේ නිවැරදිම මාවත.</p>
        <button onclick="alert('WhatsApp හරහා සම්බන්ධ වන්න!')">සම්බන්ධ වන්න</button>
    </div>

</body>
</html>
